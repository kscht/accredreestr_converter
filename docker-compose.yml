services:
  converter:
    build: .
    volumes:
      - ./data:/app/data
      - ./out:/app/out
      - ./examples:/app/examples
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: "0"
    command: start --log info --user root --pass root surrealkv:///data/accred.surreal
    volumes:
      - surreal_data:/data
    ports:
      - "${BIND_IP:-127.2.0.1}:8000:8000"
    profiles:
      - surreal
      - viewer

  api:
    build: ./viewer/api
    ports:
      - "${BIND_IP:-127.2.0.1}:8010:8010"
    environment:
      - SURREAL_URL=http://surrealdb:8000
      - SURREAL_NS=accred
      - SURREAL_DB=accred
      - SURREAL_USER=root
      - SURREAL_PASS=root
      - BIND_IP=0.0.0.0
    depends_on:
      - surrealdb
    profiles:
      - viewer

  web:
    build: ./viewer/web
    ports:
      - "${BIND_IP:-127.2.0.1}:8020:8020"
    environment:
      - BIND_IP=0.0.0.0
    depends_on:
      - api
    profiles:
      - viewer

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accred
      POSTGRES_PASSWORD: accred
      POSTGRES_DB: accred
    ports:
      - "${BIND_IP:-127.2.0.1}:5432:5432"
    profiles:
      - sql

volumes:
  surreal_data:
