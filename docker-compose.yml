services:
  converter:
    build: .
    volumes:
      - ./data:/app/data
      - ./out:/app/out
      - ./examples:/app/examples
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --log info --user root --pass root file:///data/accred.surreal
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    profiles:
      - surreal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accred
      POSTGRES_PASSWORD: accred
      POSTGRES_DB: accred
    ports:
      - "5432:5432"
    profiles:
      - sql
